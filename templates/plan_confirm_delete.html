{% extends 'base.html' %}
{% block title %}Delete Plan{% endblock %}
{% block content %}
<div class="card p-4 text-center">
    <h3>Delete "{{ plan.title }}"?</h3>
    <p class="text-muted">This action cannot be undone.</p>
    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger me-2">Yes, Delete</button>
        <a href="{% url 'plan_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
