upstream django {
    server web:8000;
}

server {
    listen 80;
    server_name 16599.wiut911.uz 128.251.49.42;
    return 301 https://16599.wiut911.uz$request_uri;
}

server {
    listen 443 ssl;
    server_name 16599.wiut911.uz;

    ssl_certificate /etc/letsencrypt/live/16599.wiut911.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/16599.wiut911.uz/privkey.pem;

    client_max_body_size 100M;

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location /media/ {
        alias /app/media/;
    }

    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }
}
