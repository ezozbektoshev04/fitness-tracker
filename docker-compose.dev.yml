version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: fitness_db_dev
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    networks:
      - fitness_network_dev

  web:
    build: .
    container_name: fitness_web_dev
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DEBUG=True
    depends_on:
      - db
    networks:
      - fitness_network_dev

volumes:
  postgres_data_dev:

networks:
  fitness_network_dev:
    driver: bridge
